name: Deploy Frontend

on:
  push:
    branches: ["*"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER2_SSH_HOST }}
          username: ${{ secrets.SERVER2_SSH_USER }}
          key: ${{ secrets.SERVER2_FRONTEND_KEY }}
          script: |
            cd /opt/cesapp
            git -C frontend pull
            docker compose up -d --build frontend
            echo "Frontend deploy tamamlandı!"

      - name: Telegram - Uğurlu
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="✅ <b>Frontend Deploy Uğurlu!</b>%0A%0A🌿 Branch: <code>${{ github.ref_name }}</code>%0A👤 Kim: <code>${{ github.actor }}</code>%0A📝 Commit: <code>${{ github.event.head_commit.message }}</code>%0A🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Workflow</a>"

      - name: Telegram - Uğursuz
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="❌ <b>Frontend Deploy Uğursuz!</b>%0A%0A🌿 Branch: <code>${{ github.ref_name }}</code>%0A👤 Kim: <code>${{ github.actor }}</code>%0A📝 Commit: <code>${{ github.event.head_commit.message }}</code>%0A🔗 <a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Workflow</a>"
