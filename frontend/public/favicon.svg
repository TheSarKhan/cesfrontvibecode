<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Orange rounded background -->
  <rect width="32" height="32" rx="7" fill="#f97316"/>
  <!-- Warehouse roof -->
  <polygon points="4,15 16,6 28,15" fill="white"/>
  <!-- Warehouse body -->
  <rect x="5" y="15" width="22" height="11" fill="white"/>
  <!-- Warehouse door (roll-up style) -->
  <rect x="11" y="19" width="10" height="7" rx="1" fill="#f97316"/>
  <line x1="11" y1="21" x2="21" y2="21" stroke="white" stroke-width="0.8"/>
  <line x1="11" y1="23" x2="21" y2="23" stroke="white" stroke-width="0.8"/>
  <line x1="11" y1="25" x2="21" y2="25" stroke="white" stroke-width="0.8"/>
</svg>
